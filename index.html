<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página - Página Pessoal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bruno</h1>
            <p>Olá! Meu nome é Bruno, tenho 18 anos e moro em Gravataí.</p>
        </header>

        <section class="hobbies">
            <h2>Meus Hobbies</h2>
            <div class="hobbies-grid">
                <div class="hobby-card">
                    <img src="mexendo no computador.webp" alt="computador">
                    <h3>Mexer no Computador</h3>
                </div>
                <div class="hobby-card">
                    <img src="jogando bola.webp" alt="jogar bola">
                    <h3>Jogar Bola</h3>
                </div>
                <div class="hobby-card">
                    <img src="ver serie.webp" alt="ver série">
                    <h3>Ver Séries</h3>
                </div>
            </div>
        </section>

        <section class="paises">
            <h2>Países que Quero Visitar</h2>
            <div class="paises-grid">
                <div class="pais-card">
                    <img src="italia.svg" alt="Itália">
                    <h3>Itália</h3>
                </div>
                <div class="pais-card">
                    <img src="canada.svg" alt="Canadá">
                    <h3>Canadá</h3>
                </div>
                <div class="pais-card">
                    <img src="holanda.png" alt="Holanda">
                    <h3>Holanda</h3>
                </div>
            </div>
        </section>

        <section class="links">
            <a href="https://www.linkedin.com/in/bruno-lopes-045274332/" class="site-link">Meu LinkedIn</a>
            <button id="mensagemBtn">Clique para ver uma mensagem!</button>
            <p id="mensagem"></p>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
